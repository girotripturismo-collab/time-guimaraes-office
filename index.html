<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Guimarães — Escritório Virtual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080812;--surface:#0f0f1e;--surface2:#16162a;
  --border:#22223a;--accent:#4a7fd4;--accent2:#7c4dff;
  --text:#dde0ff;--text2:#7070a0;
  --green:#4caf50;--orange:#ff9800;--blue:#2196f3;--red:#f44336;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Inter',sans-serif;font-size:13px;color:var(--text)}
#app{display:flex;height:100vh;width:100vw}

/* ── WORLD ── */
#world-wrap{flex:1;position:relative;overflow:hidden;cursor:grab;background:#040408}
#world-wrap.dragging{cursor:grabbing}
#world-canvas{display:block;image-rendering:pixelated}
#hud{
  position:absolute;bottom:12px;left:14px;
  font-size:10px;color:rgba(255,255,255,0.28);
  pointer-events:none;line-height:2;letter-spacing:.02em
}

/* ── SIDEBAR ── */
#sidebar{
  width:268px;min-width:268px;display:flex;flex-direction:column;
  background:var(--surface);border-left:1px solid var(--border)
}
#sb-header{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0
}
.logo{font-family:'Press Start 2P',monospace;font-size:7.5px;color:var(--accent);line-height:1.6}
.logo span{color:var(--accent2)}
.badge{
  margin-left:auto;background:var(--green);color:#000;
  font-size:8px;font-weight:700;padding:3px 8px;border-radius:100px;letter-spacing:.04em
}

/* ── AGENT LIST ── */
#agent-list{flex:1;overflow-y:auto;padding:6px}
#agent-list::-webkit-scrollbar{width:3px}
#agent-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.a-card{
  display:flex;align-items:center;gap:9px;padding:7px 9px;
  border-radius:8px;margin-bottom:2px;cursor:pointer;
  transition:background .12s;border:1px solid transparent
}
.a-card:hover{background:var(--surface2)}
.a-card.focused{background:rgba(74,127,212,.13);border-color:rgba(74,127,212,.3)}
.a-avatar{
  width:30px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0
}
.a-info{flex:1;min-width:0}
.a-name{font-weight:600;font-size:11.5px}
.a-role{color:var(--text2);font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
.s-dot.idle{background:var(--text2)}
.s-dot.working{background:var(--orange);box-shadow:0 0 5px var(--orange);animation:blink 1s infinite}
.s-dot.done{background:var(--green)}
.s-dot.checkpoint{background:var(--blue)}
.s-dot.busy{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LIVE FEED ── */
#chat-zone{display:flex;flex-direction:column;border-top:1px solid var(--border);height:240px;flex-shrink:0}
#chat-head{
  padding:7px 12px;font-size:10px;font-weight:600;color:var(--text2);
  letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;gap:6px
}
#sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text2);flex-shrink:0;transition:background .4s}
#sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
#sync-dot.working{background:var(--orange);box-shadow:0 0 6px var(--orange);animation:blink .8s infinite}
#chat-msgs{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:4px}
#chat-msgs::-webkit-scrollbar{width:3px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--border)}
.cmsg{max-width:96%;padding:6px 10px;border-radius:8px;font-size:11px;line-height:1.55}
.cmsg.bot{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:2px}
.cmsg.result{align-self:flex-start;background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.3);border-bottom-left-radius:2px}
.cmsg.system{align-self:center;color:var(--text2);font-size:10px;font-style:italic;background:transparent}
.cmsg .sndr{font-size:9px;font-weight:600;opacity:.65;margin-bottom:2px}
#task-bar{padding:5px 10px;font-size:10px;color:var(--text2);border-top:1px solid var(--border);
  background:rgba(0,0,0,.2);flex-shrink:0;display:flex;align-items:center;gap:5px;min-height:26px}
</style>
</head>

const AMBIENT = {
  adi:    ['Tudo sob controle.','Vamos executar.','Time, foquem!','Estratégia definida.'],
  ricardo:['Pesquisa ok!','Dado interessante...','Fonte verificada.','Tendência mapeada.'],

const ORC_RESP = [
  t=>`Copy that! Distribuindo a tarefa para o time.`,
  t=>`Entendido. Ricardo, pesquise. Ana, prepare o copy.`,
  t=>`Missão recebida. Time, vamos executar!`,
  t=>`Analisando... Perfeito. Acionando os especialistas.`,
  t=>`Roger that! Thiago, Rafael — vocês entram em ação.`,
];

// ── COLLISION GRID ──────────────────────────────────────────
const GRID = (() => {
  const g = Array.from({length:MH}, ()=>new Uint8Array(MW));
  for(const r of ROOMS)
    for(let y=r.y;y<r.y+r.h;y++)
      for(let x=r.x;x<r.x+r.w;x++)
        if(y>=0&&y<MH&&x>=0&&x<MW) g[y][x]=1;
  for(const f of FURNITURE)
    if(f.solid)
      for(let y=f.y;y<f.y+f.h;y++)
        for(let x=f.x;x<f.x+f.w;x++)
          if(y>=0&&y<MH&&x>=0&&x<MW) g[y][x]=0;
  return {ok:(tx,ty)=>ty>=0&&ty<MH&&tx>=0&&tx<MW&&g[ty][tx]===1};
})();

// ── AGENT STATE ──────────────────────────────────────────────
let agents = AGENT_DEF.map(d=>({
  ...d, tx:d.tx, ty:d.ty, gx:d.tx, gy:d.ty,
  // smooth interpolated pixel pos
  px:d.tx*TS, py:d.ty*TS,
  status:'idle', bubble:null, bubTimer:0,
}));

// ── CAMERA & CANVAS ──────────────────────────────────────────
let cam = {x:0, y:0, z:1.3};
let tick = 0;

const wrap = document.getElementById('world-wrap');
const cvs  = document.getElementById('world-canvas');
const ctx  = cvs.getContext('2d');

function resize(){
  cvs.width  = wrap.clientWidth;
  cvs.height = wrap.clientHeight;
}
resize();
new ResizeObserver(resize).observe(wrap);

// Start camera centered on Command Room
(function initCam(){
  cam.x = -(5*TS*cam.z) + cvs.width/2;
  cam.y = -(5*TS*cam.z) + cvs.height/2;
})();

function clampCam(){
  const ww = MW*TS*cam.z, wh = MH*TS*cam.z;
  const mg = 120;
  cam.x = Math.min(mg, Math.max(cvs.width-ww-mg, cam.x));
  cam.y = Math.min(mg, Math.max(cvs.height-wh-mg, cam.y));
}

// ── DRAW HELPERS ─────────────────────────────────────────────
function rr(x,y,w,h,r){
  if(ctx.roundRect){ctx.roundRect(x,y,w,h,r)}
  else{ctx.rect(x,y,w,h)}
}

function wrapTxt(txt,maxW){
  ctx.font='7.5px Inter';
  const words=txt.split(' '), lines=[];
  let cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w}
    else cur=t;
  }
  if(cur)lines.push(cur);
  return lines;
}

// ── RENDER: outdoor ──────────────────────────────────────────
function drawOutdoor(){
  ctx.fillStyle=FLOOR.outdoor;
  ctx.fillRect(0,0,MW*TS,MH*TS);
  ctx.strokeStyle='rgba(255,255,255,0.018)';
  ctx.lineWidth=.5;
  for(let x=0;x<=MW;x++){ctx.beginPath();ctx.moveTo(x*TS,0);ctx.lineTo(x*TS,MH*TS);ctx.stroke()}
  for(let y=0;y<=MH;y++){ctx.beginPath();ctx.moveTo(0,y*TS);ctx.lineTo(MW*TS,y*TS);ctx.stroke()}
}

// ── RENDER: rooms ────────────────────────────────────────────
function drawRooms(){
  for(const r of ROOMS){
    const rx=r.x*TS, ry=r.y*TS, rw=r.w*TS, rh=r.h*TS;
    // base fill
    ctx.fillStyle=FLOOR[r.ft];
    ctx.fillRect(rx,ry,rw,rh);
    // checker tiles
    ctx.fillStyle=FLOOR2[r.ft];
    for(let tx=0;tx<r.w;tx+=2)
      for(let ty=0;ty<r.h;ty+=2)
        ctx.fillRect(rx+tx*TS,ry+ty*TS,TS,TS);
    // grid lines
    ctx.strokeStyle='rgba(255,255,255,0.045)';ctx.lineWidth=.5;
    for(let tx=0;tx<=r.w;tx++){ctx.beginPath();ctx.moveTo(rx+tx*TS,ry);ctx.lineTo(rx+tx*TS,ry+rh);ctx.stroke()}
    for(let ty=0;ty<=r.h;ty++){ctx.beginPath();ctx.moveTo(rx,ry+ty*TS);ctx.lineTo(rx+rw,ry+ty*TS);ctx.stroke()}
    // walls
    ctx.strokeStyle=WALL[r.ft]||'#334';ctx.lineWidth=5;
    ctx.strokeRect(rx,ry,rw,rh);
    // inner bevel
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;
    ctx.strokeRect(rx+4,ry+4,rw-8,rh-8);
    // label
    ctx.font='bold 9.5px Inter';ctx.textAlign='center';
    const lw=ctx.measureText(r.name).width+14;
    const lx=rx+rw/2-lw/2, ly=ry+rh-20;
    ctx.fillStyle='rgba(0,0,0,.55)';
    ctx.beginPath();rr(lx,ly,lw,15,7);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.45)';
    ctx.fillText(r.name,rx+rw/2,ly+11);
  }
}

// ── RENDER: furniture ────────────────────────────────────────
function drawFurniture(f){
  const fx=f.x*TS, fy=f.y*TS, fw=f.w*TS, fh=f.h*TS;
  if(f.t==='plant'||f.t==='plant_big'||f.t==='tree'){
    ctx.font=`${Math.min(fw,fh,22)}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.e,fx+fw/2,fy+fh/2);
    ctx.textBaseline='alphabetic';
    return;
  }
  // shadow
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(fx+3,fy+3,fw,fh);
  // pick colors
  let fill='#1e1e36',stroke='#2e2e56';
  if(f.t==='desk')    {fill='#1c2e48';stroke='#2e4a78'}
  if(f.t==='shelf')   {fill='#2e1c0e';stroke='#5a3820'}
  if(f.t==='board')   {fill='#e8eaf6';stroke='#9fa8da'}
  if(f.t==='mtable')  {fill='#102030';stroke='#204060'}
  if(f.t==='couch')   {fill='#2a1850';stroke='#4a2880'}
  if(f.t==='ctable')  {fill='#2a1c0e';stroke='#5a3820'}
  if(f.t==='rack')    {fill='#111118';stroke='#00ff8855'}
  ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=1;
  ctx.fillRect(fx,fy,fw,fh);ctx.strokeRect(fx,fy,fw,fh);
  // highlight
  ctx.fillStyle='rgba(255,255,255,.06)';
  ctx.fillRect(fx,fy,fw,2);ctx.fillRect(fx,fy,2,fh);
  // server rack LEDs
  if(f.t==='rack'){
    for(let i=0;i<Math.ceil(fh/TS);i++){
      ctx.fillStyle=tick%60<30?'#00ff88':'#007733';
      ctx.fillRect(fx+4,fy+i*TS+6,4,3);
      ctx.fillStyle=tick%80<40?'#ff4444':'#aa1111';
      ctx.fillRect(fx+4,fy+i*TS+12,4,3);
    }
    return;
  }
  // meeting table cross lines
  if(f.t==='mtable'){
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fx+fw/2,fy+4);ctx.lineTo(fx+fw/2,fy+fh-4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx+4,fy+fh/2);ctx.lineTo(fx+fw-4,fy+fh/2);ctx.stroke();
  }
  // emoji
  if(f.e){
    const fs=Math.min(fw,fh,f.t==='board'?14:18);
    ctx.font=`${fs}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.e,fx+fw/2,fy+fh/2);
    ctx.textBaseline='alphabetic';
  }
}

// ── RENDER: agent sprite (pixel art) ─────────────────────────
function drawAgent(a){
  const cx = a.px + TS/2;
  const cy = a.py + TS - 2;
  const bob = a.status==='working' ? Math.sin(tick*.18)*2.2 : 0;
  const y   = cy - bob;
  const sp  = a.s;

  // ground shadow
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath();ctx.ellipse(cx,cy+2,9,3.5,0,0,Math.PI*2);ctx.fill();

  // shoes
  ctx.fillStyle=sp.shoes;
  ctx.fillRect(cx-7,y-2,5,3);ctx.fillRect(cx+2,y-2,5,3);
  // pants
  ctx.fillStyle=sp.pants;
  ctx.fillRect(cx-6,y-10,5,9);ctx.fillRect(cx+1,y-10,5,9);
  // shirt body
  ctx.fillStyle=sp.shirt;
  ctx.fillRect(cx-8,y-20,16,11);
  // arms
  ctx.fillRect(cx-12,y-19,4,9);ctx.fillRect(cx+8,y-19,4,9);
  // hands
  ctx.fillStyle=sp.skin;
  ctx.fillRect(cx-12,y-11,4,4);ctx.fillRect(cx+8,y-11,4,4);
  // neck
  ctx.fillStyle=sp.skin;ctx.fillRect(cx-3,y-23,6,4);
  // head
  ctx.fillStyle=sp.skin;
  ctx.beginPath();ctx.ellipse(cx,y-29,8,9,0,0,Math.PI*2);ctx.fill();
  // hair
  ctx.fillStyle=sp.hair;
  ctx.beginPath();ctx.ellipse(cx,y-36,8,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillRect(cx-8,y-37,16,7);
  // eyes
  ctx.fillStyle='#111122';
  ctx.fillRect(cx-4,y-31,2,2);ctx.fillRect(cx+2,y-31,2,2);
  // eye shine
  ctx.fillStyle='rgba(255,255,255,.65)';
  ctx.fillRect(cx-3,y-31,1,1);ctx.fillRect(cx+3,y-31,1,1);
  // shirt collar
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.fillRect(cx-2,y-22,4,4);

  // status dot
  ctx.fillStyle=STATUS_CLR[a.status]||'#607D8B';
  ctx.beginPath();ctx.arc(cx+10,y-40,4.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#08080e';ctx.lineWidth=1.5;ctx.stroke();

  // name tag
  ctx.font='bold 8.5px Inter';ctx.textAlign='center';
  const ntw=ctx.measureText(a.name).width+12;
  const ntx=cx-ntw/2, nty=y-52;
  ctx.fillStyle='rgba(8,8,14,.85)';
  ctx.beginPath();rr(ntx,nty,ntw,14,4);ctx.fill();
  ctx.fillStyle=a.id==='adi'?'#6aadff':'#dde0ff';
  ctx.fillText(a.name,cx,nty+10.5);

  // role tag (smaller)
  ctx.font='7px Inter';ctx.fillStyle='rgba(160,160,200,.5)';
  ctx.fillText(a.role,cx,nty-1);

  // speech bubble
  if(a.bubble) drawBubble(cx,nty-4,a.bubble);
}

// ── RENDER: speech bubble ────────────────────────────────────
function drawBubble(bx,by,txt){
  const lines=wrapTxt(txt,108);
  const lh=11, pad=7, bw=120;
  const bh=lines.length*lh+pad*2;
  const rx=bx-bw/2, ry=by-bh-10;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();rr(rx+2,ry+2,bw,bh,7);ctx.fill();
  // body
  ctx.fillStyle='#ffffff';
  ctx.beginPath();rr(rx,ry,bw,bh,7);ctx.fill();
  // tail
  ctx.beginPath();ctx.moveTo(bx-5,ry+bh);ctx.lineTo(bx+5,ry+bh);ctx.lineTo(bx,ry+bh+10);ctx.closePath();ctx.fill();
  // text
  ctx.fillStyle='#111122';ctx.textAlign='center';ctx.font='7.5px Inter';
  lines.forEach((l,i)=>ctx.fillText(l,bx,ry+pad+8+i*lh));
}

// ── MAIN RENDER ──────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.save();
  ctx.translate(cam.x,cam.y);
  ctx.scale(cam.z,cam.z);

  drawOutdoor();
  drawRooms();

  // Depth sort: furniture + agents by bottom Y
  const ents=[
    ...FURNITURE.map(f=>({...f,_k:'f',_sy:(f.y+f.h)*TS})),
    ...agents.map(a=>({...a,_k:'a',_sy:a.py+TS})),
  ].sort((a,b)=>a._sy-b._sy);

  for(const e of ents){
    if(e._k==='f') drawFurniture(e);
    else drawAgent(e);
  }

  ctx.restore();
}

// ── UPDATE LOOP ──────────────────────────────────────────────
function stepAgent(a){
  if(a.tx===a.gx&&a.ty===a.gy) return;
  const dx=Math.sign(a.gx-a.tx), dy=Math.sign(a.gy-a.ty);
  if(dx!==0&&GRID.ok(a.tx+dx,a.ty))      a.tx+=dx;
  else if(dy!==0&&GRID.ok(a.tx,a.ty+dy)) a.ty+=dy;
}

function update(){
  tick++;
  // move agents every 4 ticks (≈8fps movement at 20fps)
  if(tick%4===0) agents.forEach(stepAgent);

  // smooth pixel position lerp
  agents.forEach(a=>{
    const tx=a.tx*TS, ty=a.ty*TS;
    a.px+=(tx-a.px)*.25;
    a.py+=(ty-a.py)*.25;
  });

  // bubble timers
  agents.forEach(a=>{
    if(a.bubTimer>0&&--a.bubTimer===0) a.bubble=null;
  });

  // random wander
  if(tick%180===0){
    const a=agents[Math.floor(Math.random()*agents.length)];
    if(a.id!=='adi'&&a.status!=='working'){
      const r=ROOMS.find(r=>r.id===a.room);
      if(r){
        for(let i=0;i<12;i++){
          const gx=r.x+1+Math.floor(Math.random()*(r.w-2));
          const gy=r.y+1+Math.floor(Math.random()*(r.h-2));
          if(GRID.ok(gx,gy)){a.gx=gx;a.gy=gy;break}
        }
      }
    }
  }
  updateCards();
}

setInterval(update,50); // 20fps logic

// ── RAF RENDER LOOP ──────────────────────────────────────────
(function loop(){render();requestAnimationFrame(loop)})();

// ── MOUSE INTERACTION ────────────────────────────────────────
let drag=false, ds={x:0,y:0}, cs={x:0,y:0};
wrap.addEventListener('mousedown',e=>{
  drag=true;wrap.classList.add('dragging');
  ds={x:e.clientX,y:e.clientY};cs={x:cam.x,y:cam.y};
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  cam.x=cs.x+(e.clientX-ds.x);
  cam.y=cs.y+(e.clientY-ds.y);
  clampCam();
});
window.addEventListener('mouseup',e=>{
  const moved=Math.abs(e.clientX-ds.x)+Math.abs(e.clientY-ds.y);
  if(!drag)return;
  drag=false;wrap.classList.remove('dragging');
  if(moved<5){
    // click → move Adi
    const wx=(e.clientX-cam.x)/cam.z;
    const wy=(e.clientY-cam.y)/cam.z;
    const tx=Math.floor(wx/TS), ty=Math.floor(wy/TS);
    if(GRID.ok(tx,ty)){
      const adi=agents.find(a=>a.id==='adi');
      if(adi){adi.gx=tx;adi.gy=ty;}
    }
  }
});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?.88:1.14;
  const nz=Math.max(.45,Math.min(2.8,cam.z*d));
  cam.x=e.clientX-(e.clientX-cam.x)*(nz/cam.z);
  cam.y=e.clientY-(e.clientY-cam.y)*(nz/cam.z);
  cam.z=nz;clampCam();
},{passive:false});

// touch pan support
let touches={};
wrap.addEventListener('touchstart',e=>{
  [...e.changedTouches].forEach(t=>touches[t.identifier]={x:t.clientX,y:t.clientY});
  if(e.touches.length===1){
    drag=true;
    const t=e.touches[0];
    ds={x:t.clientX,y:t.clientY};cs={x:cam.x,y:cam.y};
  }
},{passive:true});
wrap.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){
    const t=e.touches[0];
    cam.x=cs.x+(t.clientX-ds.x);
    cam.y=cs.y+(t.clientY-ds.y);
    clampCam();
  }
},{passive:true});
wrap.addEventListener('touchend',e=>{drag=false},{passive:true});

// ── UI: AGENT CARDS ──────────────────────────────────────────
const list=document.getElementById('agent-list');

function buildCards(){
  agents.forEach(a=>{
    const card=document.createElement('div');
    card.className='a-card';card.id=`card-${a.id}`;
    const bg=`background:${a.s.shirt}20;border:1px solid ${a.s.shirt}55`;
    card.innerHTML=`
      <div class="a-avatar" style="${bg}">${a.e}</div>
      <div class="a-info">
        <div class="a-name">${a.name}</div>
        <div class="a-role">${a.role}</div>
      </div>
      <div class="s-dot ${a.status}" id="dot-${a.id}"></div>`;
    card.addEventListener('click',()=>{
      document.querySelectorAll('.a-card').forEach(c=>c.classList.remove('focused'));
      card.classList.add('focused');
      // pan camera to agent
      const ag=agents.find(x=>x.id===a.id);
      if(ag){
        cam.x=-(ag.tx*TS*cam.z)+cvs.width/2;
        cam.y=-(ag.ty*TS*cam.z)+cvs.height/2;
        clampCam();
      }
    });
    list.appendChild(card);
  });
}

function updateCards(){
  agents.forEach(a=>{
    const d=document.getElementById(`dot-${a.id}`);
    if(d) d.className=`s-dot ${a.status}`;
  });
}

buildCards();

// ── UI: LIVE FEED ─────────────────────────────────────────────
const msgBox   = document.getElementById('chat-msgs');
const taskLabel= document.getElementById('task-label');
const syncDot  = document.getElementById('sync-dot');

function addMsg(text, type, from){
  const d = document.createElement('div');
  d.className = `cmsg ${type}`;
  d.innerHTML = from ? `<div class="sndr">${from}</div>${text}` : text;
  msgBox.appendChild(d);
  msgBox.scrollTop = 9999;
}
function clearFeed(){ msgBox.innerHTML=''; }

function agentLabel(id){
  const a = agents.find(x=>x.id===id);
  return a ? `${a.e} ${a.name} (${a.role})` : id;
}

// ── REAL-TIME STATE POLLING ───────────────────────────────────
const STATE_URL = 'https://api.github.com/repos/girotripturismo-collab/time-guimaraes-office/contents/state.json';
let lastSha = null;
let lastFeedLen = 0;
let pollErrors = 0;

async function pollState(){
  try{
    const r = await fetch(STATE_URL + '?_=' + Date.now(), {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if(!r.ok){ pollErrors++; return; }
    const data = await r.json();
    pollErrors = 0;

    if(data.sha === lastSha) return;   // nenhuma mudança
    lastSha = data.sha;

    const _b64raw = atob(data.content.replace(/\n/g,''));
    const _u8 = new Uint8Array(_b64raw.length);
    for(let i=0;i<_b64raw.length;i++) _u8[i]=_b64raw.charCodeAt(i);
    const raw = new TextDecoder('utf-8').decode(_u8);
    const state= JSON.parse(raw);
    applyState(state);
  }catch(e){ pollErrors++; }

  // update sync indicator
  syncDot.className = pollErrors > 3 ? 'sync-dot' : 'sync-dot live';
}

function applyState(state){
  // --- status geral dos agentes ---
  agents.forEach(a=>{
    const active = state.activeAgents && state.activeAgents.includes(a.id);
    if(active){
      a.status = (state.status === 'working') ? 'working' : 'done';
    } else {
      if(a.status === 'working') a.status = 'idle';
    }
  });

  // --- task bar ---
  if(state.task){
    taskLabel.innerHTML = `<b style="color:var(--orange)">▶</b> ${state.task}`;
    syncDot.className   = 'sync-dot ' + (state.status==='working'?'working':'live');
  } else {
    taskLabel.textContent = 'Aguardando tarefas do Cowork...';
    syncDot.className = 'sync-dot live';
  }

  // --- feed de mensagens novas ---
  const feed = state.feed || [];

  // se o feed foi resetado (nova tarefa), limpa o painel
  if(feed.length < lastFeedLen){ clearFeed(); lastFeedLen = 0; }

  const novos = feed.slice(lastFeedLen);
  novos.forEach((msg, i)=>{
    setTimeout(()=>{
      const tipo = msg.type === 'result' ? 'result' : 'bot';
      addMsg(msg.text, tipo, agentLabel(msg.agent));
      // balão no mapa só para agentes em ação
      const ag = agents.find(a=>a.id===msg.agent);
      if(ag && msg.bubble !== false){
        const short = msg.text.replace(/<[^>]+>/g,'').slice(0,52);
        ag.bubble    = short + (msg.text.length > 52 ? '…' : '');
        ag.bubTimer  = 160;
      }
      updateCards();
    }, i * 280);
  });
  lastFeedLen = feed.length;
  updateCards();
}

// ── KICK-OFF ──────────────────────────────────────────────────
addMsg('Conectando ao Cowork...', 'system', null);
pollState();
setInterval(pollState, 5000);
</script>
