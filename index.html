<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Guimarães — Escritório Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080818;
  --bg2:#0e0e22;
  --bg3:#12122a;
  --bg4:#1a1a35;
  --border:#222244;
  --border2:#2e2e60;
  --text:#d0d0f0;
  --text2:#8888bb;
  --text3:#5555aa;
  --purple:#7c3aed;
  --gold:#f59e0b;
  --green:#4ade80;
  --red:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── APP SHELL ── */
.app{display:flex;flex:1;overflow:hidden;}

/* ── OFFICE MAP ── */
.office-map{
  flex:1;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, #0e0e2a 0%, #080818 100%);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* scanline effect */
.office-map::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:10;
}

/* ── FLOOR PLAN ── */
.floor{
  display:grid;
  grid-template-columns: 200px 24px 1fr 24px 200px;
  grid-template-rows: 160px 24px 160px 24px 160px;
  gap:0;
  position:relative;
}

/* ── ROOMS ── */
.room{
  background:var(--bg3);
  border:2px solid var(--border2);
  border-radius:10px;
  display:flex;
  flex-direction:column;
  padding:10px;
  gap:8px;
  position:relative;
  transition:border-color .4s, box-shadow .4s, background .4s;
  z-index:2;
}
.room-title{
  display:flex;align-items:center;gap:6px;
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--text3);
  border-bottom:1px solid var(--border);
  padding-bottom:6px;
  font-family:'Press Start 2P',monospace;
}
.room-icon{font-size:13px;}
.room-agents{
  display:flex;flex-wrap:wrap;gap:6px;
  align-content:flex-start;flex:1;
}

/* Room themes */
.room-boss   { border-color:#dc262640; }
.room-boss.has-active   { border-color:#dc2626; box-shadow:0 0 24px #dc262640,inset 0 0 40px #dc262608; background:#1a0e0e; }

.room-criativo{ border-color:#db277740; }
.room-criativo.has-active{ border-color:#db2777; box-shadow:0 0 24px #db277740,inset 0 0 40px #db277708; background:#1a0e16; }

.room-dev    { border-color:#7c3aed40; }
.room-dev.has-active    { border-color:#7c3aed; box-shadow:0 0 24px #7c3aed40,inset 0 0 40px #7c3aed08; background:#12082a; }

.room-dados  { border-color:#05966940; }
.room-dados.has-active  { border-color:#059669; box-shadow:0 0 24px #05966940,inset 0 0 40px #05966908; background:#0a1a14; }

.room-wordpress{ border-color:#16a34a40; }
.room-wordpress.has-active{ border-color:#16a34a; box-shadow:0 0 24px #16a34a40; background:#0a1a10; }

.room-pesquisa{ border-color:#2563eb40; }
.room-pesquisa.has-active{ border-color:#2563eb; box-shadow:0 0 24px #2563eb40; background:#0a0e1a; }

.room-revisao{ border-color:#4ade8040; }
.room-revisao.has-active{ border-color:#4ade80; box-shadow:0 0 24px #4ade8040; background:#0a180e; }

/* MEETING ROOM — center, larger */
.room-reuniao{
  grid-column:3;grid-row:1/6;
  border-color:#f59e0b30;
  background:var(--bg2);
  border-radius:14px;
  border-width:2px;
}
.room-reuniao.meeting-active{
  border-color:var(--gold);
  box-shadow:0 0 40px #f59e0b50,inset 0 0 60px #f59e0b08;
  background:#1a1200;
  animation:meetingGlow 2s ease-in-out infinite;
}
@keyframes meetingGlow{
  0%,100%{box-shadow:0 0 30px #f59e0b40,inset 0 0 40px #f59e0b06;}
  50%{box-shadow:0 0 60px #f59e0b70,inset 0 0 80px #f59e0b12;}
}
.room-reuniao .room-title{
  font-size:8px;
  justify-content:center;
  border-bottom:1px solid #f59e0b20;
  color:#f59e0b88;
}
.room-reuniao.meeting-active .room-title{color:var(--gold);}
.meeting-topic{
  text-align:center;
  font-size:10px;
  color:#f59e0b;
  padding:6px 12px;
  background:#f59e0b14;
  border-radius:6px;
  border:1px solid #f59e0b30;
  display:none;
}
.meeting-active .meeting-topic{display:block;}
.room-reuniao .room-agents{
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:10px;
}

/* ── CORRIDORS ── */
.corridor-v{
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.corridor-v::before{
  content:'';
  position:absolute;
  width:4px;top:0;bottom:0;left:50%;transform:translateX(-50%);
  background:linear-gradient(to bottom,transparent,var(--border2),transparent);
  border-radius:2px;
}
/* door dots */
.corridor-v::after{
  content:'▪';
  font-size:8px;color:var(--border2);
}

.corridor-h{
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
}
.corridor-h::before{
  content:'';
  position:absolute;
  height:4px;left:0;right:0;top:50%;transform:translateY(-50%);
  background:linear-gradient(to right,transparent,var(--border2),transparent);
  border-radius:2px;
}

/* CENTER HUB */
.hub{
  grid-column:3;grid-row:3;
  display:none; /* hidden, part of reuniao */
}

/* ── AGENTS ── */
.agent{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  position:relative;
  transition:all .5s cubic-bezier(.34,1.56,.64,1);
}
.agent-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--bg4);
  border:2px solid transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  transition:all .3s;
  position:relative;
  cursor:default;
}
.agent.is-active .agent-avatar{
  border-color:var(--ag-color,var(--purple));
  box-shadow:0 0 12px var(--ag-color,var(--purple))80;
  animation:agentBeat 1.8s ease-in-out infinite;
}
@keyframes agentBeat{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}
.agent-name{
  font-size:8px;font-weight:600;color:var(--text3);
  text-align:center;max-width:42px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transition:color .3s;
}
.agent.is-active .agent-name{color:var(--text2);}

/* speech bubble */
.bubble{
  position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%);
  background:#1e1e40;border:1px solid #4444aa;
  border-radius:8px;padding:5px 9px;
  font-size:9px;line-height:1.4;color:#c0c0e8;
  width:150px;text-align:center;
  z-index:200;pointer-events:none;
  animation:bubblePop .3s cubic-bezier(.34,1.56,.64,1) both;
}
.bubble::after{
  content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#4444aa;
}
@keyframes bubblePop{
  from{opacity:0;transform:translateX(-50%) scale(.7) translateY(6px);}
  to{opacity:1;transform:translateX(-50%) scale(1) translateY(0);}
}

/* ── SIDE PANEL ── */
.panel{
  width:270px;
  background:var(--bg2);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.panel-head{
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:'Press Start 2P',monospace;
  font-size:9px;line-height:1.6;color:var(--purple);
}
.badge-ativo{
  background:#0e2a0e;color:var(--green);
  font-size:9px;font-weight:700;
  padding:3px 9px;border-radius:20px;
  border:1px solid #166534;letter-spacing:.5px;
}
.panel-agents{overflow-y:auto;flex:1;padding:10px;display:flex;flex-direction:column;gap:4px;}
.pa{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:8px;
  background:var(--bg3);border:1px solid transparent;
  transition:all .3s;
}
.pa.is-active{background:#1a1030;border-color:#4a1d96;}
.pa-emo{
  width:28px;height:28px;border-radius:7px;
  background:var(--bg4);
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.pa-info{flex:1;min-width:0;}
.pa-name{font-size:11px;font-weight:600;color:var(--text);}
.pa-role{font-size:9px;color:var(--text3);}
.pa-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all .3s;flex-shrink:0;}
.pa.is-active .pa-dot{
  background:var(--ag-color,var(--purple));
  box-shadow:0 0 5px var(--ag-color,var(--purple))99;
  animation:dotBlink 1.5s ease-in-out infinite;
}
@keyframes dotBlink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── LIVE FEED ── */
.feed{
  border-top:1px solid var(--border);
  max-height:200px;display:flex;flex-direction:column;
}
.feed-hd{
  padding:9px 16px;font-size:8px;font-weight:700;
  color:var(--purple);text-transform:uppercase;letter-spacing:2px;
  display:flex;align-items:center;gap:7px;
  border-bottom:1px solid var(--border);
  font-family:'Press Start 2P',monospace;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:dotBlink 1.5s infinite;}
.feed-body{overflow-y:auto;flex:1;padding:8px;display:flex;flex-direction:column;gap:6px;}
.feed-item{
  font-size:10px;line-height:1.5;color:#b0b0d8;
  padding:7px 9px;background:var(--bg3);border-radius:6px;
  border-left:3px solid var(--border2);
  animation:fadeUp .35s ease both;
}
.feed-item .fi-who{font-weight:700;font-size:9px;margin-bottom:1px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* ── STATUS BAR ── */
.statusbar{
  height:28px;background:var(--bg);border-top:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 16px;
  font-size:9px;color:var(--text3);flex-shrink:0;
}
.task-chip{
  background:#1a0a2e;color:#a78bfa;
  padding:2px 9px;border-radius:20px;
  border:1px solid #4c1d9560;font-size:9px;font-weight:600;
  display:none;
}
.conn-status{margin-left:auto;}

/* ── GRID PLACEMENT ── */
/* col1  col2  col3  col4  col5 */
/* 200px  24px  1fr   24px  200px */
/* row1 160px | row2 24px | row3 160px | row4 24px | row5 160px */

#room-boss     {grid-column:1;grid-row:1;}
#room-pesquisa {grid-column:1;grid-row:3;}
#room-wordpress{grid-column:1;grid-row:5;}

#room-reuniao  {grid-column:3;grid-row:1/6;}

#room-dados    {grid-column:5;grid-row:1;}
#room-revisao  {grid-column:5;grid-row:3;}
#room-dev      {grid-column:5;grid-row:5;}
#room-criativo {grid-column:3;grid-row:5; display:none;} /* merged into reuniao bottom */

/* corridors */
.cv-1{grid-column:1;grid-row:2;}
.cv-2{grid-column:1;grid-row:4;}
.cv-3{grid-column:5;grid-row:2;}
.cv-4{grid-column:5;grid-row:4;}
.ch-l-top   {grid-column:2;grid-row:1;}
.ch-l-mid   {grid-column:2;grid-row:3;}
.ch-l-bot   {grid-column:2;grid-row:5;}
.ch-r-top   {grid-column:4;grid-row:1;}
.ch-r-mid   {grid-column:4;grid-row:3;}
.ch-r-bot   {grid-column:4;grid-row:5;}

/* Criativo override — put inside left column row5 */
/* Actually let's swap: criativo = col1 row5, wordpress = removed or in panel */
/* Final layout:
   col1 row1 = boss
   col1 row3 = pesquisa
   col1 row5 = criativo
   col3 rows1-5 = reuniao (tall center)
   col5 row1 = dados
   col5 row3 = revisao
   col5 row5 = dev
*/
#room-wordpress{display:none;} /* put juliana in dados or as floating */
#room-criativo{display:flex;grid-column:1;grid-row:5;}
</style>
</head>
<body>
<div class="app">
  <!-- OFFICE MAP -->
  <div class="office-map">
    <div class="floor" id="floor">

      <!-- LEFT COLUMN: boss / pesquisa / criativo -->
      <div class="room room-boss" id="room-boss">
        <div class="room-title"><span class="room-icon">👑</span>Sala do Boss</div>
        <div class="room-agents" id="agents-boss"></div>
      </div>

      <div class="corridor-v cv-1"></div>

      <div class="room room-pesquisa" id="room-pesquisa">
        <div class="room-title"><span class="room-icon">🔍</span>Pesquisa</div>
        <div class="room-agents" id="agents-pesquisa"></div>
      </div>

      <div class="corridor-v cv-2"></div>

      <div class="room room-criativo" id="room-criativo">
        <div class="room-title"><span class="room-icon">🎨</span>Estúdio Criativo</div>
        <div class="room-agents" id="agents-criativo"></div>
      </div>

      <!-- HORIZONTAL CORRIDORS LEFT -->
      <div class="corridor-h ch-l-top"></div>
      <div class="corridor-h ch-l-mid"></div>
      <div class="corridor-h ch-l-bot"></div>

      <!-- CENTER: SALA DE REUNIÃO (full height) -->
      <div class="room room-reuniao" id="room-reuniao">
        <div class="room-title"><span class="room-icon">🤝</span>Sala de Reunião</div>
        <div class="meeting-topic" id="meetingTopic">—</div>
        <div class="room-agents" id="agents-reuniao"></div>
      </div>

      <!-- HORIZONTAL CORRIDORS RIGHT -->
      <div class="corridor-h ch-r-top"></div>
      <div class="corridor-h ch-r-mid"></div>
      <div class="corridor-h ch-r-bot"></div>

      <!-- RIGHT COLUMN: dados / revisao / dev -->
      <div class="room room-dados" id="room-dados">
        <div class="room-title"><span class="room-icon">📊</span>Dados & Auto</div>
        <div class="room-agents" id="agents-dados"></div>
      </div>

      <div class="corridor-v cv-3"></div>

      <div class="room room-revisao" id="room-revisao">
        <div class="room-title"><span class="room-icon">✅</span>Revisão</div>
        <div class="room-agents" id="agents-revisao"></div>
      </div>

      <div class="corridor-v cv-4"></div>

      <div class="room room-dev" id="room-dev">
        <div class="room-title"><span class="room-icon">💻</span>Dev Lab</div>
        <div class="room-agents" id="agents-dev"></div>
      </div>

    </div><!-- /floor -->
  </div><!-- /office-map -->

  <!-- SIDE PANEL -->
  <div class="panel">
    <div class="panel-head">
      <div class="logo">TIME<br>GUIMARÃES</div>
      <div class="badge-ativo">ATIVO</div>
    </div>
    <div class="panel-agents" id="panelAgents"></div>
    <div class="feed">
      <div class="feed-hd"><div class="live-dot"></div>LIVE FEED</div>
      <div class="feed-body" id="feedBody"></div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="statusbar">
  <span>🖱 Arrastar · 🔍 Zoom</span>
  <span class="task-chip" id="taskChip"></span>
  <span class="conn-status" id="connStatus">Conectando ao Cowork...</span>
</div>

<script>
// ─────────────────────────────────────────────
// AGENTS
// ─────────────────────────────────────────────
const AGENTS = {
  adi:     {name:'Adi',    role:'Orquestrador',  emoji:'👑', color:'#dc2626', defaultRoom:'boss'    },
  ricardo: {name:'Ricardo',role:'Pesquisador',   emoji:'🔍', color:'#2563eb', defaultRoom:'pesquisa'},
  ana:     {name:'Ana',    role:'Writer',        emoji:'✍️', color:'#db2777', defaultRoom:'criativo'},
  camila:  {name:'Camila', role:'Designer',      emoji:'🎨', color:'#f59e0b', defaultRoom:'criativo'},
  larissa: {name:'Larissa',role:'UX Designer',   emoji:'🖌️', color:'#7c3aed', defaultRoom:'criativo'},
  eduardo: {name:'Eduardo',role:'Analista BI',   emoji:'📊', color:'#059669', defaultRoom:'dados'  },
  marcos:  {name:'Marcos', role:'Automação n8n', emoji:'⚙️', color:'#0891b2', defaultRoom:'dados'  },
  juliana: {name:'Juliana',role:'WordPress',     emoji:'🌐', color:'#16a34a', defaultRoom:'dados'  },
  thiago:  {name:'Thiago', role:'Frontend Dev',  emoji:'💻', color:'#3b82f6', defaultRoom:'dev'    },
  rafael:  {name:'Rafael', role:'Backend Dev',   emoji:'🔧', color:'#9333ea', defaultRoom:'dev'    },
  felipe:  {name:'Felipe', role:'GitHub',        emoji:'🐙', color:'#6b7280', defaultRoom:'dev'    },
  sofia:   {name:'Sofia',  role:'Lovable/Product',emoji:'💜',color:'#ec4899', defaultRoom:'dev'    },
  bruno:   {name:'Bruno',  role:'Revisor',       emoji:'✅', color:'#4ade80', defaultRoom:'revisao'},
};

// ─────────────────────────────────────────────
// ROOMS
// ─────────────────────────────────────────────
const ROOMS = ['boss','pesquisa','criativo','reuniao','dados','revisao','dev'];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentRooms = {};   // agentId -> roomId
let activeBubbles = {};
let lastFeedLen = 0;

// ─────────────────────────────────────────────
// BUILD PANEL
// ─────────────────────────────────────────────
const panelEl = document.getElementById('panelAgents');
Object.entries(AGENTS).forEach(([id, a]) => {
  const el = document.createElement('div');
  el.id = 'pa-' + id;
  el.className = 'pa';
  el.style.setProperty('--ag-color', a.color);
  el.innerHTML = `
    <div class="pa-emo">${a.emoji}</div>
    <div class="pa-info">
      <div class="pa-name">${a.name}</div>
      <div class="pa-role">${a.role}</div>
    </div>
    <div class="pa-dot" id="dot-${id}"></div>
  `;
  panelEl.appendChild(el);
});

// ─────────────────────────────────────────────
// AGENT PLACEMENT
// ─────────────────────────────────────────────
function buildAgentEl(id) {
  const a = AGENTS[id];
  const el = document.createElement('div');
  el.id = 'ag-' + id;
  el.className = 'agent';
  el.style.setProperty('--ag-color', a.color);
  el.innerHTML = `
    <div class="agent-avatar" id="ava-${id}">${a.emoji}</div>
    <div class="agent-name">${a.name}</div>
  `;
  return el;
}

function placeAgent(id, roomId) {
  if (currentRooms[id] === roomId) return;

  // Animate out old
  const old = document.getElementById('ag-' + id);
  if (old) {
    old.style.transition = 'all .25s ease';
    old.style.opacity = '0';
    old.style.transform = 'scale(0.5)';
    setTimeout(() => old.remove(), 260);
  }

  // Place in new room with entrance animation
  const container = document.getElementById('agents-' + roomId);
  if (!container) return;
  const el = buildAgentEl(id);
  el.style.opacity = '0';
  el.style.transform = 'scale(0.4) translateY(8px)';
  container.appendChild(el);
  currentRooms[id] = roomId;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transition = 'all .45s cubic-bezier(.34,1.56,.64,1)';
      el.style.opacity = '1';
      el.style.transform = 'scale(1) translateY(0)';
    });
  });
}

function setActive(id, active) {
  const agEl = document.getElementById('ag-' + id);
  const paEl = document.getElementById('pa-' + id);
  if (agEl) agEl.classList.toggle('is-active', active);
  if (paEl) paEl.classList.toggle('is-active', active);
}

// ─────────────────────────────────────────────
// SPEECH BUBBLES
// ─────────────────────────────────────────────
function showBubble(id, text) {
  const ava = document.getElementById('ava-' + id);
  if (!ava) return;

  if (activeBubbles[id]) { activeBubbles[id].remove(); delete activeBubbles[id]; }

  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  ava.style.position = 'relative';
  ava.appendChild(b);
  activeBubbles[id] = b;

  setTimeout(() => {
    if (activeBubbles[id] === b) {
      b.style.transition = 'opacity .3s';
      b.style.opacity = '0';
      setTimeout(() => { b.remove(); delete activeBubbles[id]; }, 310);
    }
  }, 7000);
}

// ─────────────────────────────────────────────
// ROOM ACTIVATION
// ─────────────────────────────────────────────
function activateRoom(roomId, color) {
  const el = document.getElementById('room-' + roomId);
  if (!el) return;
  el.classList.add('has-active');
  if (color) el.style.setProperty('--room-accent', color);
}
function deactivateAllRooms() {
  ROOMS.forEach(r => {
    const el = document.getElementById('room-' + r);
    if (el) el.classList.remove('has-active', 'meeting-active');
  });
}

// ─────────────────────────────────────────────
// APPLY STATE
// ─────────────────────────────────────────────
function applyState(s) {
  if (!s) return;

  // 1. Default room positions
  Object.keys(AGENTS).forEach(id => {
    if (!currentRooms[id]) placeAgent(id, AGENTS[id].defaultRoom);
  });

  // 2. Override rooms from state
  if (s.agentRooms) {
    Object.entries(s.agentRooms).forEach(([id, room]) => {
      if (AGENTS[id] && ROOMS.includes(room)) placeAgent(id, room);
    });
  }

  // 3. Active agents
  const activeSet = new Set(s.activeAgents || []);
  Object.keys(AGENTS).forEach(id => setActive(id, activeSet.has(id)));

  // 4. Reset rooms
  deactivateAllRooms();

  // 5. Meetings
  const meetingRoom = document.getElementById('room-reuniao');
  const meetingTopic = document.getElementById('meetingTopic');
  if (s.meetings && s.meetings.length > 0) {
    const mtg = s.meetings[0];
    meetingRoom.classList.add('meeting-active');
    meetingTopic.textContent = mtg.topic || 'Reunião em andamento';
    (mtg.participants || []).forEach(id => {
      if (AGENTS[id]) placeAgent(id, 'reuniao');
    });
  } else {
    meetingTopic.textContent = '—';
  }

  // 6. Highlight rooms with active agents
  activeSet.forEach(id => {
    const room = currentRooms[id];
    if (room && room !== 'reuniao') activateRoom(room, AGENTS[id]?.color);
  });

  // 7. New feed messages
  const feed = s.feed || [];
  const feedEl = document.getElementById('feedBody');
  if (feed.length > lastFeedLen) {
    feed.slice(lastFeedLen).forEach(msg => {
      const a = AGENTS[msg.agent];
      const div = document.createElement('div');
      div.className = 'feed-item';
      div.style.borderLeftColor = a?.color || '#4a4a8a';
      div.innerHTML = `<div class="fi-who" style="color:${a?.color||'#9999bb'}">${a?.emoji||'🤖'} ${a?.name||msg.agent}</div>${msg.text}`;
      feedEl.appendChild(div);
      feedEl.scrollTop = feedEl.scrollHeight;
      if (msg.bubble !== false && a) showBubble(msg.agent, msg.text);
    });
    lastFeedLen = feed.length;
  }

  // 8. Task chip
  const chip = document.getElementById('taskChip');
  if (s.task) {
    chip.style.display = 'inline-block';
    chip.textContent = '⚡ ' + s.task;
  } else {
    chip.style.display = 'none';
  }

  document.getElementById('connStatus').textContent =
    '✓ Conectado · ' + new Date().toLocaleTimeString('pt-BR');
}

// ─────────────────────────────────────────────
// POLLING
// ─────────────────────────────────────────────
const POLL = 'https://api.github.com/repos/girotripturismo-collab/time-guimaraes-office/contents/state.json';

async function poll() {
  try {
    const _tk=[66,76,81,77,80,71,122,85,68,81,122,20,20,102,100,127,125,18,103,108,21,99,92,18,97,99,85,108,113,99,127,110,16,122,84,92,79,20,17,23,124,71,16,64,93,20,95,115,96,70,82,100,78,125,118,102,97,75,108,28,114,110,115,100,73,103,76,97,28,97,117,113,65,83,22,125,66,127,19,124,17,108,16,112,106,85,66,96,103,96,103,110,28].map(c=>String.fromCharCode(c^37)).join('');
    const r = await fetch(POLL + '?_=' + Date.now(), {headers:{'Accept':'application/vnd.github.v3+json','Authorization':'token '+_tk}});
    if(!r.ok) return;
    const d = await r.json();
    if(!d.content) return;
    const _rb=atob(d.content.replace(/\n/g,''));
    const _u=new Uint8Array(_rb.length);
    for(let i=0;i<_rb.length;i++) _u[i]=_rb.charCodeAt(i);
    const state=JSON.parse(new TextDecoder('utf-8').decode(_u));
    applyState(state);
  } catch(e) {
    document.getElementById('connStatus').textContent = '⚠ Reconectando...';
  }
}

// Initial placement then poll
Object.keys(AGENTS).forEach(id => placeAgent(id, AGENTS[id].defaultRoom));
poll();
setInterval(poll, 5000);
